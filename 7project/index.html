<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body class="bg-light">

  <div class="container my-5">
    <h1 class="text-center mb-4">📝 Todo List App</h1>

    <!-- Search and Filter Section -->
    <div class="row g-2 mb-4">
      <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Search tasks...">
      </div>
      <div class="col-md-3">
        <input type="date" id="fromDate" class="form-control">
      </div>
      <div class="col-md-3">
        <input type="date" id="toDate" class="form-control">
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100" id="filterBtn">Filter</button>
      </div>
    </div>

    <!-- Todo List Display -->
    <div id="todoList" class="list-group mb-4"></div>

    <!-- Pagination -->
    <nav>
      <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>

    <!-- Add New Todo Form -->
    <div class="card shadow-sm">
      <div class="card-header">Add New Todo</div>
      <div class="card-body">
        <div class="input-group">
          <input type="text" id="newTodoInput" class="form-control" placeholder="Enter new todo">
          <button class="btn btn-success" id="addTodoBtn">Add</button>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="text-center my-3 d-none">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- Error Message -->
    <div id="error" class="alert alert-danger mt-3 d-none" role="alert"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
